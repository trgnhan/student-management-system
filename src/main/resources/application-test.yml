spring:
  profiles:
    active:
      on-profile: test
  devtools:
    add-properties: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

openapi:
  service:
    title: Management student system Test
    version: v1.0.0
    server: ${sp2:http://localhost:${server.port}}
server:
  port: 8081